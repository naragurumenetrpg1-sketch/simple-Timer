<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Focus Timer</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='44' fill='%230b0e14' stroke='%23ff9f45' stroke-width='6'/%3E%3Cline x1='50' y1='50' x2='50' y2='26' stroke='%23ff9f45' stroke-width='6' stroke-linecap='round'/%3E%3Cline x1='50' y1='50' x2='68' y2='58' stroke='%23ff9f45' stroke-width='6' stroke-linecap='round'/%3E%3Ccircle cx='50' cy='50' r='4' fill='%23ff9f45'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0e14;
    --bg-soft: #11151f;
    --amber: #ff9f45;
    --teal: #3ddc97;
    --text: #eef1f6;
    --text-dim: #6b7280;
    --ring-track: #1c2230;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 50% 20%, #141a26 0%, var(--bg) 60%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    padding: 1.5rem 1rem;
    overflow-x: hidden;
    overflow-y: auto;
  }

  .layout {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .col {
    display: flex;
    align-items: center;
  }

  .col-center {
    flex-direction: column;
  }

  .col-presets,
  .col-right {
    flex-direction: row;
  }

  .eyebrow {
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 2rem;
  }

  .timer-wrap {
    position: relative;
    width: min(320px, 75vw, 55vh);
    height: min(320px, 75vw, 55vh);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  svg.ring {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .ring-track {
    fill: none;
    stroke: var(--ring-track);
    stroke-width: 6;
  }

  .ring-progress {
    fill: none;
    stroke: var(--amber);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.4s ease;
    filter: drop-shadow(0 0 6px rgba(255, 159, 69, 0.5));
  }

  .ring-progress.done {
    stroke: var(--teal);
    filter: drop-shadow(0 0 10px rgba(61, 220, 151, 0.7));
  }

  #display {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(2.2rem, 12vmin, 4.2rem);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
    z-index: 2;
  }

  @media (max-height: 480px) {
    .eyebrow { margin-bottom: 0.8rem; }
    .timer-wrap { width: min(220px, 60vw, 42vh); height: min(220px, 60vw, 42vh); }
    .col-presets { margin-top: 0.8rem; }
    .col-right { margin-top: 0.8rem; }
    #status { margin-top: 0.8rem; }
  }

  @media (max-width: 380px) {
    .inputs { gap: 1rem; }
    .col-presets { flex-wrap: wrap; justify-content: center; }
    .col-right { flex-wrap: wrap; justify-content: center; }
  }

  #display.pulse {
    animation: pulse 1s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .inputs {
    display: flex;
    gap: 1rem;
  }

  .field {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
  }

  .field label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  input[type="number"] {
    width: 64px;
    padding: 0.5rem;
    border-radius: 10px;
    border: 1px solid #232a3a;
    background: var(--bg-soft);
    color: var(--text);
    text-align: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.1rem;
    outline: none;
  }

  input[type="number"]:focus {
    border-color: var(--amber);
  }

  .col-presets {
    gap: 0.6rem;
    margin-top: 1.2rem;
  }

  .preset {
    padding: 0.45rem 1rem;
    border-radius: 999px;
    border: 1px solid #232a3a;
    background: var(--bg-soft);
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .preset:hover {
    color: var(--text);
    border-color: var(--amber);
  }

  .preset.active {
    background: var(--amber);
    color: #1a1206;
    border-color: var(--amber);
  }

  .col-right {
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.8rem;
    margin-top: 1.8rem;
  }

  button {
    padding: 0.7rem 1.6rem;
    border: none;
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }

  button:active {
    transform: scale(0.96);
  }

  #startBtn {
    background: var(--amber);
    color: #1a1206;
  }

  #pauseBtn, #resetBtn {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid #232a3a;
  }

  #pauseBtn:hover, #resetBtn:hover {
    color: var(--text);
    border-color: #3a4256;
  }

  #status {
    margin-top: 1.6rem;
    font-size: 0.8rem;
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }

  /* ランドスケープ(横向き):中央タイマー、左にプリセット縦並び、右に入力と操作ボタンを縦並び */
  @media (orientation: landscape) and (min-width: 640px) {
    .layout {
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      width: 100%;
    }

    .col-presets {
      flex-direction: column;
      margin-top: 0;
      gap: 0.7rem;
      order: 1;
    }

    .col-center {
      order: 2;
    }

    .col-right {
      flex-direction: column;
      margin-top: 0;
      gap: 0.7rem;
      order: 3;
      width: 160px;
    }

    .col-right .inputs {
      margin-bottom: 0.3rem;
    }

    .col-right button {
      width: 100%;
    }

    .timer-wrap {
      width: min(280px, 38vh, 30vw);
      height: min(280px, 38vh, 30vw);
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .ring-progress { transition: none; }
    #display.pulse { animation: none; }
  }
</style>
</head>
<body>

  <div class="layout">

    <div class="col col-presets">
      <button class="preset" data-min="25">25分</button>
      <button class="preset" data-min="5">5分</button>
      <button class="preset" data-min="3">3分</button>
      <button class="preset" data-min="1">1分</button>
    </div>

    <div class="col col-center">
      <div class="eyebrow">FOCUS TIMER</div>
      <div class="timer-wrap">
        <svg class="ring" width="320" height="320" viewBox="0 0 320 320">
          <circle class="ring-track" cx="160" cy="160" r="148"></circle>
          <circle id="ringProgress" class="ring-progress" cx="160" cy="160" r="148"></circle>
        </svg>
        <div id="display">05:00</div>
      </div>
      <div id="status">分・秒を入力して「開始」を押してください</div>
    </div>

    <div class="col col-right">
      <div class="inputs">
        <div class="field">
          <label>分</label>
          <input type="number" id="minutes" value="5" min="0" max="999">
        </div>
        <div class="field">
          <label>秒</label>
          <input type="number" id="seconds" value="0" min="0" max="59">
        </div>
      </div>
      <button id="startBtn">開始</button>
      <button id="pauseBtn">一時停止</button>
      <button id="resetBtn">リセット</button>
    </div>

  </div>

<script>
const CIRC = 2 * Math.PI * 148;

let totalSeconds = 0;
let remaining = 0;
let timerId = null;
let isPaused = false;

const display = document.getElementById('display');
const status = document.getElementById('status');
const minutesInput = document.getElementById('minutes');
const secondsInput = document.getElementById('seconds');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const resetBtn = document.getElementById('resetBtn');
const ring = document.getElementById('ringProgress');
const presetBtns = document.querySelectorAll('.preset');

presetBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    presetBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    // 動作中・一時停止中なら一度止めてリセットしてから新しい時間を設定
    clearInterval(timerId);
    timerId = null;
    isPaused = false;

    minutesInput.value = btn.dataset.min;
    secondsInput.value = 0;
    ring.classList.remove('done');
    display.classList.remove('pulse');

    totalSeconds = parseInt(btn.dataset.min, 10) * 60;
    remaining = totalSeconds;
    updateDisplay();

    status.textContent = 'カウントダウン中';
    timerId = setInterval(tick, 1000);
  });
});

// 手動入力したらプリセットの選択状態を解除
[minutesInput, secondsInput].forEach(input => {
  input.addEventListener('input', () => {
    presetBtns.forEach(b => b.classList.remove('active'));
  });
});

ring.style.strokeDasharray = `${CIRC}`;
ring.style.strokeDashoffset = `0`;

function formatTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = (sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function updateDisplay() {
  display.textContent = formatTime(remaining);
  if (totalSeconds > 0) {
    const progress = remaining / totalSeconds;
    ring.style.strokeDashoffset = `${CIRC * (1 - progress)}`;
  }
}

function playBeep() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  // ベルのような音:基音+倍音をいくつか重ねて、すぐ立ち上がってゆっくり減衰させる
  const playBell = (delay, baseFreq, volume) => {
    const partials = [1, 2.4, 3.8, 5.2]; // 倍音の比率(ベルらしい非整数倍音)
    const gains = [1, 0.5, 0.25, 0.12];

    partials.forEach((ratio, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = baseFreq * ratio;
      osc.connect(gain);
      gain.connect(ctx.destination);

      const start = ctx.currentTime + delay;
      const peak = volume * gains[i];
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(peak, start + 0.01); // 一瞬で立ち上がる
      gain.gain.exponentialRampToValueAtTime(0.001, start + 2.2); // ゆっくり減衰

      osc.start(start);
      osc.stop(start + 2.2);
    });
  };

  // チリンチリンと5秒間鳴らす(音高を少しずつ変えながら、間隔を空けて連打)
  const pitches = [1320, 1568, 1480, 1760, 1320, 1568];
  const startTimes = [0, 0.3, 1.2, 1.7, 3.0, 3.6]; // 5秒以内に収まる打鍵タイミング
  startTimes.forEach((t, i) => {
    playBell(t, pitches[i], 0.22 - i * 0.015);
  });
}

function finish() {
  clearInterval(timerId);
  timerId = null;
  status.textContent = '時間になりました';
  ring.classList.add('done');
  display.classList.add('pulse');
  playBeep();
}

function tick() {
  if (remaining <= 0) {
    finish();
    return;
  }
  remaining--;
  updateDisplay();
  if (remaining <= 0) finish();
}

startBtn.addEventListener('click', () => {
  if (timerId) return;

  if (!isPaused) {
    const m = parseInt(minutesInput.value, 10) || 0;
    const s = parseInt(secondsInput.value, 10) || 0;
    totalSeconds = m * 60 + s;
    remaining = totalSeconds;
    ring.classList.remove('done');
    display.classList.remove('pulse');
  }

  if (remaining <= 0) {
    status.textContent = '時間を入力してください';
    return;
  }

  isPaused = false;
  status.textContent = 'カウントダウン中';
  updateDisplay();
  timerId = setInterval(tick, 1000);
});

pauseBtn.addEventListener('click', () => {
  if (timerId) {
    clearInterval(timerId);
    timerId = null;
    isPaused = true;
    status.textContent = '一時停止中';
  }
});

resetBtn.addEventListener('click', () => {
  clearInterval(timerId);
  timerId = null;
  isPaused = false;
  remaining = 0;
  totalSeconds = 0;
  ring.classList.remove('done');
  display.classList.remove('pulse');
  ring.style.strokeDashoffset = '0';
  display.textContent = '00:00';
  status.textContent = '分・秒を入力して「開始」を押してください';
});

updateDisplay();
</script>

</body>
</html>
